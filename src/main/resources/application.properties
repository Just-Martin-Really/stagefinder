spring.application.name=stagefinder

# Local development DB (in-memory)
spring.datasource.url=jdbc:h2:mem:stagefinder;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA defaults for local development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console (dev convenience)
spring.h2.console.enabled=true

# setlist.fm integration (do not hardcode secrets)
setlistfm.base-url=${SETLISTFM_BASE_URL:https://api.setlist.fm}
setlistfm.api-version=${SETLISTFM_API_VERSION:1.0}
setlistfm.api-key=${SETLISTFM_API_KEY:}
setlistfm.timeout-seconds=${SETLISTFM_TIMEOUT_SECONDS:10}

