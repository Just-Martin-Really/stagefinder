spring.application.name=stagefinder

# PostgreSQL datasource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/stagefinder}
spring.datasource.username=${DB_USERNAME:stagefinder}
spring.datasource.password=${DB_PASSWORD:stagefinder}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# setlist.fm integration (do not hardcode secrets)
setlistfm.base-url=${SETLISTFM_BASE_URL:https://api.setlist.fm}
setlistfm.api-version=${SETLISTFM_API_VERSION:1.0}
setlistfm.api-key=${SETLISTFM_API_KEY:}
setlistfm.timeout-seconds=${SETLISTFM_TIMEOUT_SECONDS:10}

# OpenAPI / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# Spring Session (JDBC — stored in PostgreSQL)
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=86400s

# Session cookie
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
