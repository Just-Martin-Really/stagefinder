services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      SETLISTFM_API_KEY: ${SETLISTFM_API_KEY}
      SETLISTFM_BASE_URL: ${SETLISTFM_BASE_URL:-https://api.setlist.fm}
      SETLISTFM_API_VERSION: ${SETLISTFM_API_VERSION:-1.0}
      SETLISTFM_TIMEOUT_SECONDS: ${SETLISTFM_TIMEOUT_SECONDS:-10}
