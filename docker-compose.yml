services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: stagefinder
      POSTGRES_USER: ${DB_USERNAME:-stagefinder}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stagefinder}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-stagefinder}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/stagefinder
      DB_USERNAME: ${DB_USERNAME:-stagefinder}
      DB_PASSWORD: ${DB_PASSWORD:-stagefinder}
      SETLISTFM_API_KEY: ${SETLISTFM_API_KEY}
      SETLISTFM_BASE_URL: ${SETLISTFM_BASE_URL:-https://api.setlist.fm}
      SETLISTFM_API_VERSION: ${SETLISTFM_API_VERSION:-1.0}
      SETLISTFM_TIMEOUT_SECONDS: ${SETLISTFM_TIMEOUT_SECONDS:-10}

volumes:
  postgres_data:
