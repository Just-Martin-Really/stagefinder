site_name: Stagefinder
site_url: https://just-martin-really.github.io/stagefinder/
site_description: Find where your favourite artists are playing.
repo_url: https://github.com/Just-Martin-Really/stagefinder
repo_name: Just-Martin-Really/stagefinder
copyright: Copyright &copy; 2025 Martin Ließ

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.path
    - navigation.sections
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - toc.follow

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Just-Martin-Really/stagefinder
      name: Stagefinder on GitHub
  generator: false

nav:
  - Overview: index.md
  - Architecture: architecture.md
  - Setup:
      - Local setup: setup.md
      - Environment variables: environment.md
  - API: api.md
  - Security: security.md
  - Frontend: frontend.md
  - Testing: testing.md
  - Docker: docker.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      auto_title: true
      pygments_lang_class: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
